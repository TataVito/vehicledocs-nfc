<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentos Vehículo — RVC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #CC2028;
    --primary-dark: #A51820;
    --bg: #F5F5F5;
    --card: #fff;
    --text: #212121;
    --muted: #757575;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; padding: 24px 20px 28px; text-align: center; }
  .header-logo { height: 54px; margin-bottom: 14px; filter: drop-shadow(0 2px 6px rgba(0,0,0,.25)); }
  .patente-display { font-size: 34px; font-weight: 800; letter-spacing: 4px; font-family: monospace; background: rgba(255,255,255,.18); display: inline-block; padding: 8px 24px; border-radius: 10px; margin-bottom: 10px; }
  .vehiculo-nombre { font-size: 19px; font-weight: 600; margin-bottom: 4px; }
  .vehiculo-detalle { font-size: 13px; opacity: .85; }

  .body { padding: 16px; max-width: 600px; margin: 0 auto; }
  .card { background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .badge-vigente { background: #E8F5E9; color: #2E7D32; }
  .badge-proximo { background: #FFF3E0; color: #E65100; }
  .badge-vencido { background: #FFEBEE; color: #C62828; }

  .doc-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #F5F5F5; font-size: 14px; }
  .doc-row:last-child { border-bottom: none; }
  .doc-row span:first-child { color: var(--muted); }
  .doc-row span:last-child { font-weight: 500; text-align: right; }

  .doc-img { width: 100%; border-radius: 10px; margin-top: 14px; cursor: pointer; border: 1px solid #EEE; max-height: 200px; object-fit: cover; transition: opacity .2s; }
  .doc-img:active { opacity: .8; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 32px; cursor: pointer; line-height: 1; }

  .state { text-align: center; padding: 60px 20px; }
  .state .icon { font-size: 48px; margin-bottom: 12px; }
  .state h2 { font-size: 20px; margin-bottom: 8px; }
  .state p { color: var(--muted); font-size: 14px; }
  .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 60px 20px; }
  .big-spinner { width: 40px; height: 40px; border: 4px solid #DDD; border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; padding: 20px; font-size: 12px; color: #BBB; }
</style>
</head>
<body>

<div id="app">
  <div class="spinner-wrap">
    <div class="big-spinner"></div>
    <p style="color:#888">Cargando datos del vehículo...</p>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const SUPABASE_URL = 'https://tiykdyqpfxnxgvpfvvwm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IEedxSduro5Go1L6mHWLXg_dNxLGrWP';
const BUCKET = 'vehicledocs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const patente = new URLSearchParams(location.search).get('p')?.toUpperCase();

async function main() {
  const app = document.getElementById('app');

  if (!patente) {
    app.innerHTML = `<div class="state"><div class="icon">🔍</div><h2>Sin patente</h2><p>Escanea el tag NFC del vehículo para ver sus documentos.</p></div>`;
    return;
  }

  const { data, error } = await sb.from('vehiculos').select('*').eq('patente', patente).single();

  if (error || !data) {
    app.innerHTML = `<div class="state"><div class="icon">❌</div><h2>Vehículo no encontrado</h2><p>No hay registros para la patente <strong>${patente}</strong>.</p></div>`;
    return;
  }

  document.title = `${patente} — ${data.marca} ${data.modelo}`;

  const fotos = {};
  for (const sec of ['permiso', 'soap', 'rt', 'rg']) {
    for (const ext of ['jpg', 'jpeg', 'png', 'webp', 'heic']) {
      const path = `${patente}/${sec}.${ext}`;
      const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(path);
      const res = await fetch(urlData.publicUrl, { method: 'HEAD' });
      if (res.ok) { fotos[sec] = urlData.publicUrl; break; }
    }
  }

  app.innerHTML = renderPage(data, fotos);
}

function getStatus(venc) {
  if (!venc || !venc.includes('/')) return null;
  const [m, y] = venc.split('/');
  if (!m || !y || isNaN(m) || isNaN(y)) return null;
  const exp = new Date(parseInt(y), parseInt(m), 0);
  const diff = Math.floor((exp - new Date()) / 86400000);
  if (diff < 0)   return { label: 'VENCIDO',           cls: 'badge-vencido' };
  if (diff <= 30) return { label: `Vence en ${diff}d`, cls: 'badge-proximo' };
  return            { label: `Vigente · ${venc}`,      cls: 'badge-vigente' };
}

function badge(venc) {
  const s = getStatus(venc);
  return s ? `<span class="badge ${s.cls}">${s.label}</span>` : '';
}

function docRow(label, value) {
  if (!value) return '';
  return `<div class="doc-row"><span>${label}</span><span>${value}</span></div>`;
}

function imgCard(sec, fotos) {
  return fotos[sec] ? `<img class="doc-img" src="${fotos[sec]}" alt="Foto documento" onclick="openLightbox('${fotos[sec]}')">` : '';
}

function renderPage(d, fotos) {
  return `
    <div class="header">
      <img class="header-logo" src="rvc.jpg" alt="RVC">
      <div class="patente-display">${d.patente}</div>
      <div class="vehiculo-nombre">${[d.marca, d.modelo].filter(Boolean).join(' ') || 'Vehículo'}</div>
      <div class="vehiculo-detalle">${[d.anio, d.color].filter(Boolean).join(' · ')}</div>
    </div>

    <div class="body">

      <div class="card">
        <div class="card-header">
          <div class="card-title">📄 Permiso de Circulación</div>
          ${badge(d.permiso_venc)}
        </div>
        ${docRow('Municipalidad', d.permiso_municipio)}
        ${docRow('Vencimiento', d.permiso_venc)}
        ${imgCard('permiso', fotos)}
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">🛡️ Seguro Obligatorio (SOAP)</div>
          ${badge(d.soap_venc)}
        </div>
        ${docRow('Compañía', d.soap_compania)}
        ${docRow('Vencimiento', d.soap_venc)}
        ${imgCard('soap', fotos)}
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">🔧 Revisión Técnica</div>
          ${badge(d.rt_venc)}
        </div>
        ${docRow('Planta', d.rt_planta)}
        ${docRow('Vencimiento', d.rt_venc)}
        ${imgCard('rt', fotos)}
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">💨 Revisión de Gases</div>
          ${badge(d.rg_venc)}
        </div>
        ${docRow('Planta', d.rg_planta)}
        ${docRow('Vencimiento', d.rg_venc)}
        ${imgCard('rg', fotos)}
      </div>

      <div class="footer">RVC · Documentos de Flota</div>
    </div>`;
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

main();
</script>
</body>
</html>
