<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Docs Vehículo NFC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #1565C0;
    --primary-dark: #0D47A1;
    --accent: #FF6F00;
    --bg: #F0F2F5;
    --card: #FFFFFF;
    --text: #212121;
    --muted: #757575;
    --success: #2E7D32;
    --error: #C62828;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  .toolbar { background: var(--primary); color: #fff; padding: 14px 16px; font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 6px rgba(0,0,0,.3); }

  #banner { display: none; background: var(--accent); color: #fff; padding: 10px 16px; align-items: center; gap: 8px; }
  #banner.show { display: flex; }
  #banner span { flex: 1; font-size: 14px; font-weight: 600; }
  #banner button { background: none; border: 1.5px solid #fff; color: #fff; border-radius: 20px; padding: 4px 14px; cursor: pointer; font-size: 13px; }

  .tabs { background: var(--primary); display: flex; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 80px; padding: 12px 8px; text-align: center; color: rgba(255,255,255,.6); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; transition: .2s; white-space: nowrap; }
  .tab.active { color: #fff; border-bottom-color: var(--accent); }

  .pages { flex: 1; overflow: hidden; }
  .page { display: none; padding: 16px; overflow-y: auto; height: calc(100vh - 220px); }
  .page.active { display: block; }

  .card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  .field input[type="text"],
  .field input[type="number"] { width: 100%; padding: 11px 14px; border: 1.5px solid #D0D5DD; border-radius: 8px; font-size: 15px; color: var(--text); background: #fff; transition: border-color .2s; outline: none; }
  .field input:focus { border-color: var(--primary); }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }

  /* Foto */
  .foto-area { margin-top: 16px; border-top: 1px solid #EEE; padding-top: 14px; }
  .foto-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .foto-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; display: none; margin-bottom: 8px; border: 1px solid #DDD; }
  .foto-preview.show { display: block; }
  .foto-loading { display: none; text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }
  .foto-loading.show { display: block; }
  .btn-foto { display: flex; align-items: center; gap: 8px; background: #F0F4FF; border: 1.5px dashed var(--primary); color: var(--primary); border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; justify-content: center; }
  .btn-foto:active { background: #E3EAFF; }
  input[type="file"] { display: none; }

  .bottom-bar { background: #fff; padding: 12px 16px; display: flex; gap: 10px; box-shadow: 0 -2px 8px rgba(0,0,0,.08); }
  .btn { flex: 1; height: 50px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: .15s; }
  .btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn:active { opacity: .85; transform: scale(.98); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
  .modal h2 { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 14px; }
  .modal-body { flex: 1; overflow-y: auto; }
  .modal-text { background: #F5F5F5; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 13px; line-height: 1.7; white-space: pre; margin-bottom: 12px; }
  .modal-fotos { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .modal-foto-item { flex: 1; min-width: 130px; }
  .modal-foto-item label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
  .modal-foto-item img { width: 100%; border-radius: 8px; border: 1px solid #DDD; max-height: 140px; object-fit: cover; }
  .modal-foto-item .no-foto { background: #F5F5F5; border-radius: 8px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); }
  .modal-actions { display: flex; flex-direction: column; gap: 8px; }
  .btn-success { background: var(--success); color: #fff; border: none; border-radius: 10px; height: 48px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-ghost { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 8px; text-align: center; }

  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity .3s; white-space: nowrap; max-width: 90vw; text-align: center; }
  #toast.show { opacity: 1; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .pulse { animation: pulse 1.2s infinite; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="toolbar">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/></svg>
  Docs Vehículo NFC
</div>

<div id="banner">
  <span id="bannerText" class="pulse">Acerca el tag NFC...</span>
  <button onclick="cancelar()">Cancelar</button>
</div>

<div class="tabs" id="tabBar"></div>
<div class="pages" id="pageContainer"></div>

<div class="bottom-bar">
  <button class="btn btn-outline" onclick="iniciarLectura()">LEER TAG</button>
  <button class="btn btn-primary" id="btnEscribir" onclick="iniciarEscritura()">ESCRIBIR TAG</button>
</div>

<!-- Modal lectura -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>📋 Datos del tag NFC</h2>
    <div class="modal-body">
      <div class="modal-text" id="modalContent"></div>
      <div class="modal-fotos" id="modalFotos"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-success" onclick="cargarEnFormulario()">CARGAR EN FORMULARIO</button>
      <button class="btn-ghost" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Supabase ────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://tiykdyqpfxnxgvpfvvwm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IEedxSduro5Go1L6mHWLXg_dNxLGrWP';
const BUCKET = 'vehicledocs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── Secciones con fotos ─────────────────────────────────────────────────────
const FOTO_SECTIONS = ['permiso', 'soap', 'revision'];
const FOTO_LABELS = { permiso: 'Permiso de Circulación', soap: 'SOAP', revision: 'Revisión Técnica' };

// Almacena los File objects seleccionados antes de subir
const selectedFiles = { permiso: null, soap: null, revision: null };
// URLs públicas de fotos subidas (para mostrar en formulario)
const uploadedUrls = { permiso: null, soap: null, revision: null };

// ─── Tabs ────────────────────────────────────────────────────────────────────
const TABS = [
  {
    id: 'vehiculo', label: 'Vehículo', icon: '🚗',
    fields: [
      { id: 'patente',  label: 'Patente / Placa',         type: 'text',   upper: true },
      { id: 'marca',    label: 'Marca',                    type: 'text' },
      { id: 'modelo',   label: 'Modelo',                   type: 'text' },
      { row: [
        { id: 'anio',   label: 'Año',    type: 'number', maxlen: 4 },
        { id: 'color',  label: 'Color',  type: 'text' }
      ]},
      { id: 'vin',      label: 'VIN / Número de chasis',   type: 'text',   upper: true, maxlen: 17 }
    ],
    foto: false
  },
  {
    id: 'permiso', label: 'Permiso', icon: '📄',
    fields: [
      { id: 'pNumero',    label: 'Número de permiso',      type: 'text' },
      { id: 'pMunicipio', label: 'Municipalidad',          type: 'text' },
      { id: 'pVenc',      label: 'Vencimiento (MM/AAAA)',  type: 'text', maxlen: 7 }
    ],
    foto: true
  },
  {
    id: 'soap', label: 'SOAP', icon: '🛡️',
    fields: [
      { id: 'sCompania', label: 'Compañía aseguradora',    type: 'text' },
      { id: 'sPoliza',   label: 'Número de póliza',        type: 'text' },
      { id: 'sVenc',     label: 'Vencimiento (MM/AAAA)',   type: 'text', maxlen: 7 }
    ],
    foto: true
  },
  {
    id: 'revision', label: 'Rev. Técnica', icon: '🔧',
    fields: [
      { id: 'rtNumero', label: 'Número de revisión',       type: 'text' },
      { id: 'rtPlanta', label: 'Planta revisora',          type: 'text' },
      { id: 'rtVenc',   label: 'Vencimiento (MM/AAAA)',    type: 'text', maxlen: 7 }
    ],
    foto: true
  }
];

function buildField(f) {
  if (f.row) return `<div class="row">${f.row.map(buildField).join('')}</div>`;
  const attrs = [`id="${f.id}"`, `type="${f.type || 'text'}"`,
    f.upper ? 'style="text-transform:uppercase"' : '',
    f.maxlen ? `maxlength="${f.maxlen}"` : ''
  ].filter(Boolean).join(' ');
  return `<div class="field"><label>${f.label}</label><input ${attrs}></div>`;
}

function buildFotoSection(tabId) {
  return `
    <div class="foto-area">
      <div class="foto-label">📷 Foto del documento</div>
      <div class="foto-loading" id="fotoLoading-${tabId}">Cargando foto...</div>
      <img class="foto-preview" id="fotoPreview-${tabId}" alt="Foto documento">
      <button class="btn-foto" onclick="document.getElementById('fotoInput-${tabId}').click()">
        📷 Tomar foto o seleccionar imagen
      </button>
      <input type="file" id="fotoInput-${tabId}" accept="image/*" capture="environment"
        onchange="onFotoSelected('${tabId}', this)">
    </div>`;
}

const tabBar = document.getElementById('tabBar');
const pageContainer = document.getElementById('pageContainer');

TABS.forEach((tab, i) => {
  tabBar.innerHTML += `<div class="tab${i===0?' active':''}" onclick="switchTab(${i})">${tab.icon} ${tab.label}</div>`;
  const title = { vehiculo:'Datos del Vehículo', permiso:'Permiso de Circulación', soap:'Seguro Obligatorio (SOAP)', revision:'Revisión Técnica' }[tab.id];
  pageContainer.innerHTML += `
    <div class="page${i===0?' active':''}" id="page-${i}">
      <div class="card">
        <div class="card-title">${tab.icon} ${title}</div>
        ${tab.fields.map(buildField).join('')}
        ${tab.foto ? buildFotoSection(tab.id) : ''}
      </div>
    </div>`;
});

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.page').forEach((p, j) => p.classList.toggle('active', i===j));
}

// ─── Selección de foto ───────────────────────────────────────────────────────
function onFotoSelected(tabId, input) {
  const file = input.files[0];
  if (!file) return;
  selectedFiles[tabId] = file;
  const preview = document.getElementById(`fotoPreview-${tabId}`);
  preview.src = URL.createObjectURL(file);
  preview.classList.add('show');
}

// ─── Supabase Storage ────────────────────────────────────────────────────────
async function subirFotos(patente) {
  const results = {};
  for (const section of FOTO_SECTIONS) {
    const file = selectedFiles[section];
    if (!file) continue;
    const ext = file.name.split('.').pop() || 'jpg';
    const path = `${patente}/${section}.${ext}`;
    const { error } = await sb.storage.from(BUCKET).upload(path, file, { upsert: true });
    if (error) { toast(`Error subiendo foto ${section}: ${error.message}`); continue; }
    const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
    results[section] = data.publicUrl;
    uploadedUrls[section] = data.publicUrl;
  }
  return results;
}

async function obtenerFotos(patente) {
  const urls = {};
  for (const section of FOTO_SECTIONS) {
    for (const ext of ['jpg', 'jpeg', 'png', 'webp', 'heic']) {
      const path = `${patente}/${section}.${ext}`;
      const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
      // Verificar si existe
      const res = await fetch(data.publicUrl, { method: 'HEAD' });
      if (res.ok) { urls[section] = data.publicUrl; break; }
    }
  }
  return urls;
}

// ─── Serialización ───────────────────────────────────────────────────────────
function val(id) { return (document.getElementById(id)?.value || '').trim(); }
function set(id, v) { const el = document.getElementById(id); if (el) el.value = v || ''; }

function toJson() {
  return JSON.stringify({
    v:  { p: val('patente'), m: val('marca'), mo: val('modelo'), a: val('anio'), c: val('color'), vin: val('vin') },
    pc: { n: val('pNumero'), mu: val('pMunicipio'), v: val('pVenc') },
    s:  { c: val('sCompania'), p: val('sPoliza'), v: val('sVenc') },
    rt: { n: val('rtNumero'), pl: val('rtPlanta'), v: val('rtVenc') }
  });
}

function fromJson(json) {
  const d = JSON.parse(json);
  const v = d.v||{}, pc = d.pc||{}, s = d.s||{}, rt = d.rt||{};
  return { patente:v.p, marca:v.m, modelo:v.mo, anio:v.a, color:v.c, vin:v.vin,
           pNumero:pc.n, pMunicipio:pc.mu, pVenc:pc.v,
           sCompania:s.c, sPoliza:s.p, sVenc:s.v,
           rtNumero:rt.n, rtPlanta:rt.pl, rtVenc:rt.v };
}

function toReadable(d) {
  const line = (label, val) => `${label.padEnd(12)}: ${val||'—'}`;
  return [
    '═══ VEHÍCULO ══════════════════',
    line('Patente',   d.patente), line('Marca',d.marca), line('Modelo',d.modelo),
    line('Año',d.anio), line('Color',d.color), line('VIN',d.vin), '',
    '═══ PERMISO DE CIRCULACIÓN ════',
    line('Número',d.pNumero), line('Municipio',d.pMunicipio), line('Vence',d.pVenc), '',
    '═══ SOAP ══════════════════════',
    line('Compañía',d.sCompania), line('Póliza',d.sPoliza), line('Vence',d.sVenc), '',
    '═══ REVISIÓN TÉCNICA ══════════',
    line('Número',d.rtNumero), line('Planta',d.rtPlanta), line('Vence',d.rtVenc),
  ].join('\n');
}

// ─── NFC ─────────────────────────────────────────────────────────────────────
let nfcController = null;
let lastReadData = null;
let lastReadFotos = {};

function showBanner(msg) {
  document.getElementById('bannerText').textContent = msg;
  document.getElementById('banner').classList.add('show');
}
function hideBanner() { document.getElementById('banner').classList.remove('show'); }

function cancelar() {
  if (nfcController) { nfcController.abort(); nfcController = null; }
  hideBanner();
  document.getElementById('btnEscribir').disabled = false;
  document.getElementById('btnEscribir').innerHTML = 'ESCRIBIR TAG';
}

async function iniciarEscritura() {
  if (!('NDEFReader' in window)) { toast('Web NFC no disponible — usa Chrome en Android'); return; }
  const patente = val('patente');
  if (!patente) { toast('Ingresa la patente antes de escribir'); switchTab(0); return; }

  const btn = document.getElementById('btnEscribir');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Subiendo fotos...';

  try {
    await subirFotos(patente);
  } catch(e) {
    toast('Error subiendo fotos: ' + e.message);
  }

  btn.innerHTML = '<span class="spinner"></span>Acerca el tag...';
  showBanner('Acerca el tag NFC para ESCRIBIR...');
  cancelar();
  nfcController = new AbortController();

  try {
    const writer = new NDEFReader();
    const json = toJson();
    await writer.write(
      { records: [{ recordType: 'mime', mediaType: 'application/vnd.rvc.vehicledocs', data: new TextEncoder().encode(json) }] },
      { signal: nfcController.signal, overwrite: true }
    );
    hideBanner();
    btn.disabled = false;
    btn.innerHTML = 'ESCRIBIR TAG';
    toast('Tag escrito y fotos guardadas ✓');
  } catch(e) {
    hideBanner();
    btn.disabled = false;
    btn.innerHTML = 'ESCRIBIR TAG';
    if (e.name !== 'AbortError') toast('Error NFC: ' + e.message);
  }
}

async function iniciarLectura() {
  if (!('NDEFReader' in window)) { toast('Web NFC no disponible — usa Chrome en Android'); return; }
  cancelar();
  showBanner('Acerca el tag NFC para LEER...');
  nfcController = new AbortController();
  try {
    const reader = new NDEFReader();
    await reader.scan({ signal: nfcController.signal });
    reader.addEventListener('reading', async ({ message }) => {
      const record = message.records.find(r =>
        r.mediaType === 'application/vnd.rvc.vehicledocs' || r.recordType === 'mime' || r.recordType === 'text'
      );
      if (!record) { toast('El tag no tiene datos de vehículo'); return; }
      const text = new TextDecoder().decode(record.data);
      try {
        lastReadData = fromJson(text);
        hideBanner(); cancelar();
        document.getElementById('modalContent').textContent = toReadable(lastReadData);

        // Mostrar modal con spinner de fotos
        const fotosEl = document.getElementById('modalFotos');
        fotosEl.innerHTML = '<div style="color:#888;font-size:13px;padding:8px 0">Cargando fotos...</div>';
        document.getElementById('overlay').classList.add('show');

        // Cargar fotos
        lastReadFotos = await obtenerFotos(lastReadData.patente);
        renderFotosModal(lastReadFotos);
      } catch { toast('Formato de tag no reconocido'); }
    });
  } catch(e) {
    hideBanner();
    if (e.name !== 'AbortError') toast('Error: ' + e.message);
  }
}

function renderFotosModal(fotos) {
  const el = document.getElementById('modalFotos');
  const sections = FOTO_SECTIONS.map(s => {
    const url = fotos[s];
    return `<div class="modal-foto-item">
      <label>${FOTO_LABELS[s]}</label>
      ${url
        ? `<img src="${url}?t=${Date.now()}" alt="${s}" onclick="window.open(this.src)">`
        : `<div class="no-foto">Sin foto</div>`
      }
    </div>`;
  }).join('');
  el.innerHTML = sections || '';
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function cerrarModal() { document.getElementById('overlay').classList.remove('show'); }

function cargarEnFormulario() {
  if (!lastReadData) return;
  Object.entries(lastReadData).forEach(([k, v]) => set(k, v));

  // Cargar previews de fotos
  FOTO_SECTIONS.forEach(section => {
    const url = lastReadFotos[section];
    if (!url) return;
    const preview = document.getElementById(`fotoPreview-${section}`);
    if (preview) { preview.src = url; preview.classList.add('show'); }
    uploadedUrls[section] = url;
  });

  cerrarModal();
  switchTab(0);
  toast('Datos y fotos cargados en el formulario ✓');
}

// ─── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) cerrarModal();
});
</script>
</body>
</html>
